services:
  opentelemetry-test-collector:
    build: .
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP/Protobuf
    environment:
      GRPC_SERVER_PORT: 4317
      HTTP_SERVER_PORT: 4318
      TRACES_CACHE_SIZE: 1000
      METRICS_CACHE_SIZE: 1000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4318/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s